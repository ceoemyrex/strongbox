events {
    worker_connections 1024;
}

http {
    upstream strongbox_cluster {
        server strongbox-node-1:8200 max_fails=3 fail_timeout=10s;
        server strongbox-node-2:8200 max_fails=3 fail_timeout=10s backup;
        server strongbox-node-3:8200 max_fails=3 fail_timeout=10s backup;
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:SSL:10m;

        location /internal/ {
            return 403;
        }

        location = /v1/sys/health {
            proxy_pass        http://strongbox_cluster;
            proxy_read_timeout 5s;
            access_log        off;
        }

        location / {
            proxy_pass              http://strongbox_cluster;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto https;
            proxy_read_timeout      30s;
            proxy_connect_timeout   5s;
            proxy_send_timeout      10s;
            proxy_buffering         off;
        }
    }
}
