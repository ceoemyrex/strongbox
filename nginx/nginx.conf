# nginx/nginx.conf — StrongBox edge: TLS termination + cluster load balancing
#
# Blocks /internal/* at the edge — peer election traffic stays on the
# Docker bridge and is never reachable from the public internet.

upstream strongbox_cluster {
    # least_conn so write-heavy leader traffic distributes more evenly.
    # Followers redirect writes back to the leader anyway, but reads
    # can be served by any node.
    least_conn;
    server strongbox-node-1:8200 max_fails=3 fail_timeout=10s;
    server strongbox-node-2:8200 max_fails=3 fail_timeout=10s;
    server strongbox-node-3:8200 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # Replace DOMAIN with your actual domain after provisioning.
    ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;

    # Block internal cluster routes from the public internet.
    location /internal/ {
        return 403;
    }

    # Health check — no auth required, used by load balancer probes.
    location = /v1/sys/health {
        proxy_pass         http://strongbox_cluster;
        proxy_read_timeout 5s;
        access_log         off;
    }

    # All other API routes.
    location / {
        proxy_pass              http://strongbox_cluster;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_read_timeout      30s;
        proxy_connect_timeout   5s;
        proxy_send_timeout      10s;

        # Don't buffer — secrets responses should stream directly.
        proxy_buffering         off;
    }
}
